name: Run tests
on: [push]

# on:
#   push:
#     branches: [main, dev]
#   pull_request:
#     branches: [main, dev]


jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Run Zig tests
        run: zig test -O ReleaseSafe ./src/test_min.zig